listening-port=3478
tls-listening-port=443
listening-ip=0.0.0.0
min-port=49152
max-port=49252
realm=turn.artem.rocks
server-name=turn.artem.rocks
fingerprint
# use-auth-secret is set via command line in entrypoint
stale-nonce=600
total-quota=100
max-bps=10000000
cert=/etc/letsencrypt/live/turn.artem.rocks/fullchain.pem
pkey=/etc/letsencrypt/live/turn.artem.rocks/privkey.pem
# Removed deprecated no-loopback-peers
no-multicast-peers
# Enable TCP relay allocations (critical for mobile/restricted networks)
no-cli
log-file=/var/log/turnserver.log
simple-log
